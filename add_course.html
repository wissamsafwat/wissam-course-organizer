<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>course organizer - add course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">home</a></li>
                <li><a href="courses.html">my courses</a></li>
                <li><a href="add_course.html">add course</a></li>
                <li><a href="contact.html">contact us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="form">
           <h3>please enter the data of the course down below to add it</h3>
           <hr>
            <form>
                <div id="allformitems">
                    <div class="formItem">
                        <label for="courseName">course name: </label>
                        <input type="text" id="courseName" name="courseName" placeholder="Maths - 2">
                    </div>
                    <div class="formItem">
                        <label for="instructor">instructor: </label>
                        <input type="text" id="instructor" name="instructor" placeholder="prof emad">
                    </div>
                    <div class="formItem">
                        <label for="credits">credit hours: </label>
                        <input type="number" id="credits" name="credits" placeholder="enter a number">
                    </div>
                    <div class="formItem">
                        <label for="notes">notes: </label>
                        <textarea name="notes" id="notes" name="notes" rows="3" placeholder="type your notes here"></textarea>
                    </div>
                </div>
                <button type="submit">Add course</button>
            </form>
        </section>
        
    </main>

</body>
</html>
